<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Meher Holidays</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .gallery-page-container {
            padding: 100px 20px 60px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .gallery-title {
            text-align: center;
            margin-bottom: 40px;
            font-size: 2.5rem;
            color: var(--text-dark);
        }
        .gallery-grid-full {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .gallery-card {
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            height: 350px;
            transition: transform 0.3s ease;
        }
        .gallery-card:hover {
            transform: scale(1.02);
        }
        .gallery-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        @media (max-width: 768px) {
            .gallery-page-container {
                padding-top: 80px;
            }
            .gallery-title {
                font-size: 2rem;
            }
            .gallery-grid-full {
                grid-template-columns: 1fr;
            }
            .gallery-card {
                height: 300px;
            }
        }
    </style>
</head>
<body>
    

    <header id="header">
        <div class="container nav-container">
            <a href="index.html" class="logo"><img src="images/logo.png" alt="Meher Holidays Logo"></a>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html#home">Home</a></li>
                    <li><a href="index.html#packages">Packages</a></li>
                    <li><a href="index.html#about">About</a></li>
                    <li><a href="index.html#gallery">Gallery</a></li>
                    <li><a href="index.html#reviews">Reviews</a></li>
                    <li><a href="index.html#contact">Contact</a></li>
                </ul>
            </nav>
            <button class="mobile-menu-btn"><i class="fas fa-bars"></i></button>
        </div>
    </header>

    <div class="gallery-page-container">
        <h1 class="gallery-title">Our Travel Gallery</h1>
        <div class="gallery-grid-full">
            <div class="gallery-card">
                <img src="TravelGallary/TravelGallary1.jpeg" alt="Travel Moment 1">
            </div>
            <div class="gallery-card">
                <img src="TravelGallary/TravelGallary2.jpeg" alt="Travel Moment 2">
            </div>
            <div class="gallery-card">
                <img src="TravelGallary/TravelGallary3.jpeg" alt="Travel Moment 3">
            </div>
            <div class="gallery-card">
                <img src="TravelGallary/TravelGallary4.jpeg" alt="Travel Moment 4">
            </div>
            <!-- Fallback placeholders if more are needed -->
            <div class="gallery-card">
                <img src="images/Himachal_pradesh_Card.jpg" alt="Himachal">
            </div>
            <div class="gallery-card">
                <img src="images/Bhutan_Banner.jpg" alt="Bhutan">
            </div>
        </div>
    </div>

    
  <!-- Get in Touch -->
  <section id="contact" class="section bg-pastel">
    <div class="container contact-container">
      <div class="contact-info">
        <h2>Get in Touch</h2>
        <p>Ready for your next adventure? Contact us today to plan your trip!</p>
        <div class="contact-details">
          <div class="contact-item">
            <i class="fas fa-phone-alt"></i>
            <span>+91 98765 43210</span>
          </div>
          <div class="contact-item">
            <i class="fas fa-envelope"></i>
            <span>holidaysmeher@gmail.com</span>
          </div>
          <div class="contact-item">
            <i class="fas fa-map-marker-alt"></i>
            <span>New Delhi, India</span>
          </div>
        </div>
        <div class="social-links">
          <a href="#" class="social-icon"><i class="fab fa-instagram"></i></a>
          <a href="https://wa.me/917338132315" class="social-icon" target="_blank"><i class="fab fa-whatsapp"></i></a>
          <a href="#" class="social-icon"><i class="fab fa-facebook-f"></i></a>
        </div>
      </div>

      <div class="contact-form-container">
        <form id="contactForm" class="contact-form">
          <div class="form-group">
            <input type="text" id="name" placeholder="Your Name" required>
          </div>
          <div class="form-group">
            <input type="tel" id="phone" placeholder="Your Phone Number" required>
          </div>
          <div class="form-group">
            <textarea id="message" rows="4" placeholder="How can we help you plan your trip?" required></textarea>
          </div>
          <button type="submit" class="btn btn-primary btn-full">Send Message</button>
        </form>
      </div>
    </div>
  </section>

  <footer>
        <div class="container">
            <p>&copy; 2026 Meher Holidays. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>

    

    

    

    

    

    

    

    <!-- Travel Background Animation -->
    <div class="travel-bg-animation">
        <i class="fas fa-solid fa-cloud cloud c1"></i>
        <i class="fas fa-solid fa-cloud cloud c2"></i>
        <i class="fas fa-solid fa-cloud cloud c3"></i>
        <i class="fas fa-solid fa-plane plane"></i>
        <i class="fas fa-solid fa-motorcycle bike"></i>
        <!-- Detailed Shikara Houseboat SVG -->

            <path d="M120 300 L 120 200 L 180 160 L 580 160 L 640 200 L 640 300 Z" fill="currentColor" opacity="0.8"/>
            <path d="M180 160 L 380 110 L 580 160 Z" fill="currentColor"/>
            <rect x="180" y="210" width="30" height="50" rx="3" fill="white" opacity="0.3"/>
            <rect x="230" y="210" width="30" height="50" rx="3" fill="white" opacity="0.3"/>
            <rect x="280" y="210" width="30" height="50" rx="3" fill="white" opacity="0.3"/>
            <rect x="330" y="210" width="30" height="50" rx="3" fill="white" opacity="0.3"/>
            <rect x="380" y="210" width="30" height="50" rx="3" fill="white" opacity="0.3"/>
            <rect x="430" y="210" width="30" height="50" rx="3" fill="white" opacity="0.3"/>
            <rect x="480" y="210" width="30" height="50" rx="3" fill="white" opacity="0.3"/>
            <rect x="530" y="210" width="30" height="50" rx="3" fill="white" opacity="0.3"/>
        </svg>
    </div>
</body>
</html>
