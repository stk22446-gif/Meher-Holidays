<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Memories | Meher Holidays</title>
    <meta name="description" content="Explore our stunning travel gallery — a compass of destinations curated by Meher Holidays.">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', sans-serif;
            background: #050a14;
            color: #fff;
            overflow-x: hidden;
        }

        /* ─── HERO SPOTLIGHT ─────────────────────────── */
        .gallery-hero {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* full-screen blurred background that changes with active item */
        .hero-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            transition: background-image 0.7s ease;
            filter: blur(18px) brightness(0.35) saturate(1.2);
            transform: scale(1.08);
            z-index: 0;
        }

        /* ─── FEATURED IMAGE BOX ─────────────────────── */
        .featured-wrap {
            position: relative;
            z-index: 2;
            width: min(520px, 90vw);
            aspect-ratio: 16/9;
            border-radius: 22px;
            overflow: hidden;
            box-shadow: 0 30px 80px rgba(0,0,0,0.7), 0 0 0 2px rgba(255,255,255,0.06);
            transition: transform 0.5s cubic-bezier(0.22,1,0.36,1);
        }

        .featured-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.55s ease;
        }

        .featured-label {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 30px 24px 20px;
            background: linear-gradient(0deg, rgba(0,0,0,0.82) 0%, transparent 100%);
        }

        .featured-label h2 {
            font-size: 1.7rem;
            font-weight: 800;
            letter-spacing: 0.4px;
            line-height: 1.1;
        }

        .featured-label p {
            font-size: 0.9rem;
            opacity: 0.75;
            margin-top: 4px;
        }

        /* ─── COMPASS TICKER ─────────────────────────── */
        .compass-ring-wrap {
            position: relative;
            z-index: 3;
            margin-top: 36px;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .compass-ring {
            position: relative;
            width: 560px;
            height: 280px; /* half circle */
            overflow: hidden;
        }

        /* the actual rotatable disc (full circle, half shown) */
        .disc {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 560px;
            height: 560px;
            border-radius: 50%;
            transition: transform 0.6s cubic-bezier(0.22,1,0.36,1);
        }

        /* each dot on the disc */
        .compass-item {
            position: absolute;
            width: 72px;
            height: 72px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid rgba(255,255,255,0.18);
            cursor: pointer;
            transition: border-color 0.3s, box-shadow 0.3s, transform 0.3s;
            /* position relative to disc center */
            transform-origin: center;
        }

        .compass-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }

        .compass-item.active {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59,130,246,0.35);
            transform: scale(1.22) !important;
            z-index: 10;
        }

        /* ─── ACTIVE INDICATOR LINE ──────────────────── */
        .compass-indicator {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 48px;
            background: linear-gradient(to top, #3b82f6, transparent);
            z-index: 5;
        }

        /* ─── NAV ARROWS ─────────────────────────────── */
        .compass-nav {
            position: relative;
            z-index: 4;
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-top: 18px;
        }

        .nav-btn {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            border: 1.5px solid rgba(255,255,255,0.18);
            background: rgba(255,255,255,0.07);
            color: #fff;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.22s, border-color 0.22s, transform 0.18s;
            backdrop-filter: blur(6px);
        }

        .nav-btn:hover {
            background: rgba(59,130,246,0.22);
            border-color: #3b82f6;
            transform: scale(1.08);
        }

        /* ─── DOT INDICATORS ─────────────────────────── */
        .dot-row {
            position: relative;
            z-index: 4;
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 18px;
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: rgba(255,255,255,0.25);
            cursor: pointer;
            transition: background 0.25s, transform 0.25s;
        }

        .dot.active {
            background: #3b82f6;
            transform: scale(1.35);
        }

        /* ─── TOP NAV BAR ────────────────────────────── */
        .gallery-nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            padding: 18px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 100;
            background: linear-gradient(180deg, rgba(5,10,20,0.85), transparent);
        }

        .gallery-nav a.logo-link img { height: 38px; filter: brightness(0) invert(1); }

        .gallery-nav .back-btn {
            font-size: 0.88rem;
            color: rgba(255,255,255,0.72);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
        }

        .gallery-nav .back-btn:hover { color: #fff; }

        /* ─── TITLE ──────────────────────────────────── */
        .gallery-title {
            position: relative;
            z-index: 2;
            text-align: center;
            margin-bottom: 8px;
        }

        .gallery-title .eyebrow {
            font-size: 0.75rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #3b82f6;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .gallery-title h1 {
            font-size: clamp(1.8rem, 4vw, 2.8rem);
            font-weight: 800;
            line-height: 1.05;
            color: #fff;
        }

        /* ─── SWIPE HINT ─────────────────────────────── */
        .swipe-hint {
            position: relative;
            z-index: 2;
            font-size: 0.78rem;
            color: rgba(255,255,255,0.35);
            text-align: center;
            margin-top: 8px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        /* ─── RESPONSIVE ─────────────────────────────── */
        @media (max-width: 600px) {
            .compass-ring, .disc { width: 360px; }
            .compass-ring { height: 180px; }
            .disc { height: 360px; }
            .compass-item { width: 54px; height: 54px; }
            .featured-wrap { width: 94vw; }
            .gallery-hero { height: auto; min-height: 100svh; padding: 100px 0 40px; }
        }
    </style>
</head>

<body>

    <!-- Top Nav -->
    <nav class="gallery-nav">
        <a href="index.html" class="logo-link"><img src="images/logo.png" alt="Meher Holidays"></a>
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Home</a>
    </nav>

    <!-- Main Hero -->
    <section class="gallery-hero" id="galleryHero">
        <div class="hero-bg" id="heroBg"></div>

        <!-- Title -->
        <div class="gallery-title">
            <p class="eyebrow">Travel Memories</p>
            <h1>Our Compass of <br>Adventures</h1>
        </div>

        <!-- Featured Image -->
        <div class="featured-wrap" id="featuredWrap">
            <img id="featuredImg" class="featured-img" src="" alt="">
            <div class="featured-label">
                <h2 id="featuredName"></h2>
                <p id="featuredSub"></p>
            </div>
        </div>

        <!-- Compass Ring -->
        <div class="compass-ring-wrap">
            <div class="compass-ring">
                <div class="disc" id="disc">
                    <!-- Items injected by JS -->
                </div>
                <div class="compass-indicator"></div>
            </div>
        </div>

        <!-- Arrows -->
        <div class="compass-nav">
            <button class="nav-btn" id="prevBtn" aria-label="Previous destination">
                <i class="fas fa-chevron-left"></i>
            </button>
            <button class="nav-btn" id="nextBtn" aria-label="Next destination">
                <i class="fas fa-chevron-right"></i>
            </button>
        </div>

        <!-- Dot indicators -->
        <div class="dot-row" id="dotRow"></div>

        <p class="swipe-hint">← swipe or use arrows to explore →</p>
    </section>

    <script>
        const destinations = [
            { name: "Bhutan",               sub: "Kingdom of the Thunder Dragon",   img: "images/Bhutan_Banner.jpg",              link: "Bhutan.html" },
            { name: "Himachal Pradesh",      sub: "Mountains, Valleys & Monasteries", img: "images/Himachal_pradesh_Banner.jpg",   link: "Himachal.html" },
            { name: "Spiti Valley",          sub: "Cold Desert Himalayan Adventure",  img: "images/SummerSpitiValleyAdventure.jpg",link: "Himachal.html" },
            { name: "Kashmir",               sub: "Paradise on Earth",               img: "images/slide1.jpg",                     link: "Kashmir.html" },
            { name: "Dreamy Himachal",       sub: "Shimla · Kufri · Manali",         img: "images/DreamyHimachalGetaway.jpg",      link: "Himachal.html" },
            { name: "Group Adventures",      sub: "Travel with your tribe",           img: "images/GroupTrip.jpg",                  link: "index.html#packages" },
            { name: "Travel Gallery I",      sub: "Captured moments in the wild",    img: "images/TravelGallary1.jpeg",            link: "index.html#gallery" },
            { name: "Travel Gallery II",     sub: "Landscapes beyond imagination",   img: "images/TravelGallary2.jpeg",            link: "index.html#gallery" },
            { name: "Mountain Peaks",        sub: "Above the clouds",                img: "images/slide2.jpg",                     link: "index.html#packages" },
            { name: "Hidden Valleys",        sub: "Off the beaten path",             img: "images/slide3.jpg",                     link: "index.html#packages" },
        ];

        const RADIUS = 240; // half of .disc width
        const disc = document.getElementById('disc');
        const dotRow = document.getElementById('dotRow');
        const featuredImg = document.getElementById('featuredImg');
        const featuredName = document.getElementById('featuredName');
        const featuredSub = document.getElementById('featuredSub');
        const heroBg = document.getElementById('heroBg');

        let current = 0;
        let discAngle = 0; // current rotation angle of disc
        const N = destinations.length;
        const STEP = 360 / N; // degrees per item

        // Build compass items
        const items = destinations.map((d, i) => {
            const el = document.createElement('div');
            el.className = 'compass-item';
            el.dataset.index = i;
            const img = document.createElement('img');
            img.src = d.img;
            img.alt = d.name;
            el.appendChild(img);
            disc.appendChild(el);

            const dot = document.createElement('div');
            dot.className = 'dot';
            dot.dataset.index = i;
            dotRow.appendChild(dot);

            el.addEventListener('click', () => goTo(i));
            dot.addEventListener('click', () => goTo(i));

            return el;
        });

        function placeItems() {
            // responsive radius
            const discW = disc.offsetWidth;
            const R = discW / 2 - 36;
            items.forEach((el, i) => {
                const angle = i * STEP; // 0–360 on disc
                const rad = (angle - 90) * Math.PI / 180; // 0° = top (12 o'clock)
                const cx = discW / 2 + R * Math.cos(rad) - 36;
                const cy = discW / 2 + R * Math.sin(rad) - 36;
                el.style.left = cx + 'px';
                el.style.top  = cy + 'px';
            });
        }

        function updateUI() {
            items.forEach((el, i) => el.classList.toggle('active', i === current));
            document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === current));

            const dest = destinations[current];
            // featured image cross-fade
            featuredImg.style.opacity = 0;
            setTimeout(() => {
                featuredImg.src = dest.img;
                featuredImg.alt = dest.name;
                featuredImg.style.opacity = 1;
            }, 200);
            featuredName.textContent = dest.name;
            featuredSub.textContent  = dest.sub;
            heroBg.style.backgroundImage = `url('${dest.img}')`;
        }

        function rotateDiscTo(index) {
            // We want the active item to appear at the top (270° in disc coords, since 0°=top in our placement)
            // item[i] is placed at angle = i * STEP - 90 (in standard math)
            // to bring item[i] to the top (270° position on circle, or -90°), rotate disc by -(i * STEP)
            discAngle = -(index * STEP);
            disc.style.transform = `translateX(-50%) rotate(${discAngle}deg)`;

            // Counter-rotate each item so thumbnails stay upright
            items.forEach(el => {
                el.style.transform = `rotate(${-discAngle}deg)`;
            });
            // Active item gets scale via CSS class
            items[index].style.transform = `rotate(${-discAngle}deg) scale(1.22)`;
        }

        function goTo(index) {
            current = ((index % N) + N) % N;
            rotateDiscTo(current);
            updateUI();
        }

        document.getElementById('prevBtn').addEventListener('click', () => goTo(current - 1));
        document.getElementById('nextBtn').addEventListener('click', () => goTo(current + 1));

        // Keyboard support
        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft')  goTo(current - 1);
            if (e.key === 'ArrowRight') goTo(current + 1);
        });

        // Touch / swipe support
        let touchStartX = 0;
        document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
        document.addEventListener('touchend', e => {
            const dx = e.changedTouches[0].clientX - touchStartX;
            if (Math.abs(dx) > 40) goTo(current + (dx < 0 ? 1 : -1));
        });

        // Scroll support
        let lastScroll = 0;
        window.addEventListener('wheel', e => {
            const now = Date.now();
            if (now - lastScroll < 400) return;
            lastScroll = now;
            goTo(current + (e.deltaY > 0 ? 1 : -1));
        }, { passive: true });

        // Click featured image → go to destination page
        document.getElementById('featuredWrap').style.cursor = 'pointer';
        document.getElementById('featuredWrap').addEventListener('click', () => {
            window.location.href = destinations[current].link;
        });

        // Init
        placeItems();
        rotateDiscTo(0);
        updateUI();
        window.addEventListener('resize', () => { placeItems(); rotateDiscTo(current); });
    </script>

</body>
</html>
