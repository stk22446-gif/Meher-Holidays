<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Meher Holidays</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .gallery-page-container {
            padding: 100px 20px 60px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .gallery-title {
            text-align: center;
            margin-bottom: 40px;
            font-size: 2.5rem;
            color: var(--text-dark);
        }
        .gallery-grid-full {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .gallery-card {
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            height: 350px;
            transition: transform 0.3s ease;
        }
        .gallery-card:hover {
            transform: scale(1.02);
        }
        .gallery-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        @media (max-width: 768px) {
            .gallery-page-container {
                padding-top: 80px;
            }
            .gallery-title {
                font-size: 2rem;
            }
            .gallery-grid-full {
                grid-template-columns: 1fr;
            }
            .gallery-card {
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <header id="header">
        <div class="container nav-container">
            <a href="index.html" class="logo"><img src="images/logo.png" alt="Meher Holidays Logo"></a>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html#home">Home</a></li>
                    <li><a href="index.html#packages">Packages</a></li>
                    <li><a href="index.html#about">About</a></li>
                    <li><a href="index.html#gallery">Gallery</a></li>
                    <li><a href="index.html#contact">Contact</a></li>
                </ul>
            </nav>
            <button class="mobile-menu-btn"><i class="fas fa-bars"></i></button>
        </div>
    </header>

    <div class="gallery-page-container">
        <h1 class="gallery-title">Our Travel Gallery</h1>
        <div class="gallery-grid-full">
            <div class="gallery-card">
                <img src="TravelGallary/TravelGallary1.jpeg" alt="Travel Moment 1">
            </div>
            <div class="gallery-card">
                <img src="TravelGallary/TravelGallary2.jpeg" alt="Travel Moment 2">
            </div>
            <div class="gallery-card">
                <img src="TravelGallary/TravelGallary3.jpeg" alt="Travel Moment 3">
            </div>
            <div class="gallery-card">
                <img src="TravelGallary/TravelGallary4.jpeg" alt="Travel Moment 4">
            </div>
            <!-- Fallback placeholders if more are needed -->
            <div class="gallery-card">
                <img src="images/Himachal_pradesh_Card.jpg" alt="Himachal">
            </div>
            <div class="gallery-card">
                <img src="images/Bhutan_Banner.jpg" alt="Bhutan">
            </div>
        </div>
    </div>

    <footer>
        <div class="container">
            <p>&copy; 2026 Meher Holidays. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
